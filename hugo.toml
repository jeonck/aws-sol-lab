baseURL = "https://jeonck.github.io/aws-sol-lab/"
title = "AWS Solutions Lab"
theme = "hextra"
defaultContentLanguage = "en"
enableRobotsTXT = true
enableGitInfo = false
hasCJKLanguage = false

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false

[outputs]
  home = ["html"]
  page = ["html"]
  section = ["html", "rss"]

[params]
  description = "Hands-on AWS architecture labs — core architecture styles, scenario-based designs, and career-ready portfolio material for AWS engineers."
  displayUpdatedDate = true
  dateFormat = "January 2, 2006"

  [params.navbar]
    displayTitle = true
    displayLogo = false
    width = "full"

  [params.page]
    width = "normal"

  [params.theme]
    default = "system"
    displayToggle = true

  [params.footer]
    enable = true
    displayCopyright = true
    displayPoweredBy = false
    width = "normal"

  [params.search]
    enable = true
    type = "flexsearch"
    [params.search.flexsearch]
      index = "content"
      tokenize = "forward"

  [params.toc]
    displayTags = true

  [params.highlight.copy]
    enable = true
    display = "hover"

[[menu.main]]
  name = "Search"
  weight = 0
  [menu.main.params]
    type = "search"

[[menu.main]]
  name = "Architectures"
  pageRef = "/docs/architectures"
  weight = 1

[[menu.main]]
  name = "Scenarios"
  pageRef = "/docs/scenarios"
  weight = 2

[[menu.main]]
  name = "Labs"
  pageRef = "/docs/labs"
  weight = 3

[[menu.main]]
  name = "Career"
  pageRef = "/docs/career"
  weight = 4

[[menu.main]]
  name = "GitHub"
  url = "https://github.com/jeonck/aws-sol-lab"
  weight = 99
  [menu.main.params]
    icon = "github"
